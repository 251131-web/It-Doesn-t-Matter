<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dimension Film</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; font-family: Arial, sans-serif; color: white; }
    #videoContainer { position: fixed; inset: 0; background: black; }
    video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; opacity: 0;
      transition: opacity 0.5s ease;
      filter: contrast(1.05) brightness(0.95);
    }
    #grain {
      position: fixed; inset: 0; pointer-events: none;
      opacity: 0.07; mix-blend-mode: soft-light;
      background-image: url('https://grainy-gradients.vercel.app/noise.svg');
      animation: grainShift 0.25s steps(2) infinite;
    }
    @keyframes grainShift {
      0%  { transform: translate(0,0); }    25% { transform: translate(-1%,1%); }
      50% { transform: translate(1%,-1%); } 75% { transform: translate(1%,1%); }
    }
    #vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    }
    #info {
      position: fixed; bottom: 20px; left: 20px; z-index: 100;
      background: rgba(0,0,0,0.45); padding: 10px 15px;
      border-radius: 10px; backdrop-filter: blur(8px);
      font-size: 13px; line-height: 1.6;
    }
    #startScreen {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      flex-direction: column; background: black;
      z-index: 999; text-align: center; padding: 24px;
    }
    #startButton {
      margin-top: 20px; padding: 14px 28px; font-size: 18px;
      border: none; border-radius: 999px; background: white;
      color: black; cursor: pointer; transition: transform 0.2s ease;
    }
    #startButton:hover { transform: scale(1.05); }
    .glitch { animation: glitch 0.18s linear; }
    @keyframes glitch {
      0%  { transform: translate(0,0); }     25% { transform: translate(-5px,2px); }
      50% { transform: translate(5px,-2px); } 75% { transform: translate(-2px,-4px); }
      100%{ transform: translate(0,0); }
    }
  </style>
</head>
<body>

<div id="startScreen">
  <h1>DIMENSION FILM</h1>
  <p style="margin-top:12px; max-width:600px; opacity:0.8;">
    Every viewing is different.<br>The dimensions rearrange themselves each time.
  </p>
  <button id="startButton">ENTER</button>
</div>

<div id="videoContainer">
  <!-- Start muted so preloading is never blocked.
       The muted attribute is REMOVED after the user clicks Enter,
       which permanently unlocks audio for both elements. -->
  <video id="vidA" playsinline muted preload="auto"></video>
  <video id="vidB" playsinline muted preload="auto"></video>
</div>

<div id="grain"></div>
<div id="vignette"></div>

<div id="info">
  <div><strong>Dimension:</strong> <span id="dimensionName">—</span></div>
  <div><strong>Cuts:</strong> <span id="cutCounter">0</span></div>
  <div><strong>Reality Seed:</strong> <span id="seedDisplay"></span></div>
</div>

<script>
// ── ELEMENTS ──────────────────────────────────────────────────────────────────
const vidA        = document.getElementById('vidA');
const vidB        = document.getElementById('vidB');
const startBtn    = document.getElementById('startButton');
const startScreen = document.getElementById('startScreen');
const dimLabel    = document.getElementById('dimensionName');
const cutLabel    = document.getElementById('cutCounter');
const seedLabel   = document.getElementById('seedDisplay');

// ── CONFIG ────────────────────────────────────────────────────────────────────
const MIN_CLIP = 5;
const MAX_CLIP = 12;
const BUFFER   = 2;

// ── ADD YOUR VIDEOS HERE ──────────────────────────────────────────────────────
const dimensions = {
  MEMORY: ['videos/memory1.mp4', 'videos/memory2.mp4'],
  HORROR: ['videos/horror1.mp4', 'videos/horror2.mp4'],
  DREAM:  ['videos/dream1.mp4',  'videos/dream2.mp4'],
  VOID:   ['videos/void1.mp4',   'videos/void2.mp4'],
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentDim = 'MEMORY';
let lastClip   = '';
let cutCount   = 0;
let showVid    = vidA;
let hideVid    = vidB;
let cutTimer   = null;
let audioUnlocked = false;

// pending is module-scoped so vid swaps never corrupt it
let pending = { dim: null, clip: null, promise: null };

// ── SEED ──────────────────────────────────────────────────────────────────────
let seed = localStorage.getItem('realitySeed');
if (!seed) { seed = Math.random().toString(36).slice(2,10); localStorage.setItem('realitySeed', seed); }
seedLabel.textContent = seed;

// ── UTILS ─────────────────────────────────────────────────────────────────────
const pick  = arr => arr[Math.floor(Math.random() * arr.length)];
const range = (a, b) => Math.random() * (b - a) + a;

function pickDim() {
  if (Math.random() < 0.35) return currentDim;
  return pick(Object.keys(dimensions));
}
function pickClip(dim) {
  const clips = dimensions[dim];
  let c = pick(clips);
  while (c === lastClip && clips.length > 1) c = pick(clips);
  return c;
}

// ── AUDIO UNLOCK ──────────────────────────────────────────────────────────────
// Called once, synchronously inside the click handler.
// Removes the `muted` attribute from both videos permanently.
// Chrome tracks which elements were unmuted during a gesture and
// allows them to play with audio for the rest of the session.
function unlockAudio() {
  [vidA, vidB].forEach(vid => {
    vid.removeAttribute('muted'); // must use removeAttribute, not .muted = false
    vid.volume = 0;               // start silent; we control volume per-swap
  });
  audioUnlocked = true;
}

// ── PRELOAD ───────────────────────────────────────────────────────────────────
function preloadClip(vid, clip) {
  return new Promise((resolve) => {
    const fullUrl = new URL(clip, location.href).href;
    if (vid.src !== fullUrl) {
      vid.onloadedmetadata = null;
      vid.onerror = null;
      vid.src = clip;
      vid.load();
    }

    function doSeek() {
      const safe  = Math.max(0, vid.duration - BUFFER - MIN_CLIP);
      const start = range(0, Math.max(0, safe));
      vid.currentTime = start;

      let done = false;
      const finish = () => { if (!done) { done = true; resolve(); } };
      vid.addEventListener('seeked', finish, { once: true });
      setTimeout(finish, 1000);
    }

    if (vid.readyState >= 1) {
      doSeek();
    } else {
      vid.onloadedmetadata = doSeek;
      vid.onerror = () => resolve();
    }
  });
}

// ── KICK NEXT PRELOAD ─────────────────────────────────────────────────────────
function kickPreload() {
  const dim  = pickDim();
  const clip = pickClip(dim);
  pending.dim     = dim;
  pending.clip    = clip;
  pending.promise = preloadClip(hideVid, clip);
}

// ── CUT ───────────────────────────────────────────────────────────────────────
async function cut() {
  clearTimeout(cutTimer);

  await pending.promise;

  // Silence the incoming video before play() so there's no blip
  hideVid.volume = 0;

  try {
    await hideVid.play();
  } catch(e) {
    console.warn('play() blocked, retrying:', e);
    cutTimer = setTimeout(cut, 500);
    return;
  }

  const incoming = hideVid;
  const outgoing = showVid;

  // Visual swap
  incoming.style.opacity = '1';
  outgoing.style.opacity = '0';

  // Audio swap — incoming full volume, outgoing silent, then stop
  incoming.volume = 1;
  outgoing.volume = 0;
  setTimeout(() => outgoing.pause(), 700);

  // Update tracking
  currentDim = pending.dim || currentDim;
  lastClip   = pending.clip || lastClip;
  dimLabel.textContent = currentDim;

  [showVid, hideVid] = [incoming, outgoing];

  cutCount++;
  cutLabel.textContent = cutCount;

  if (Math.random() > 0.92) {
    incoming.classList.add('glitch');
    setTimeout(() => incoming.classList.remove('glitch'), 180);
  }

  kickPreload();
  cutTimer = setTimeout(cut, range(MIN_CLIP, MAX_CLIP) * 1000);
}

// ── START ─────────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  startScreen.style.display = 'none';

  // Unlock audio synchronously inside the gesture — this is the key.
  // After this point both video elements are permanently unmuted and
  // Chrome will allow them to play with audio for the rest of the session.
  unlockAudio();

  const dim  = pickDim();
  const clip = pickClip(dim);
  pending.dim     = dim;
  pending.clip    = clip;
  pending.promise = preloadClip(hideVid, clip);
  cut();
});

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { clearTimeout(cutTimer); kickPreload(); cut(); }
  if (e.key.toLowerCase() === 'g' && showVid) {
    showVid.classList.add('glitch');
    setTimeout(() => showVid.classList.remove('glitch'), 180);
  }
});
</script>

</body>
</html>
