<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dimension Film</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    #videoContainer {
      position: fixed;
      inset: 0;
      background: black;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
      filter: contrast(1.05) brightness(0.95);
    }

    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.07;
      mix-blend-mode: soft-light;
      background-image: url('https://grainy-gradients.vercel.app/noise.svg');
      animation: grainShift 0.25s steps(2) infinite;
    }

    @keyframes grainShift {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-1%,1%); }
      50%  { transform: translate(1%,-1%); }
      75%  { transform: translate(1%,1%); }
      100% { transform: translate(0,0); }
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    }

    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.45);
      padding: 10px 15px;
      border-radius: 10px;
      backdrop-filter: blur(8px);
      font-size: 13px;
      line-height: 1.6;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: black;
      z-index: 999;
      text-align: center;
      padding: 24px;
    }

    #startButton {
      margin-top: 20px;
      padding: 14px 28px;
      font-size: 18px;
      border: none;
      border-radius: 999px;
      background: white;
      color: black;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    #startButton:hover { transform: scale(1.05); }

    .glitch { animation: glitch 0.18s linear; }

    @keyframes glitch {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-5px, 2px); }
      50%  { transform: translate(5px, -2px); }
      75%  { transform: translate(-2px, -4px); }
      100% { transform: translate(0,0); }
    }
  </style>
</head>
<body>

<div id="startScreen">
  <h1>DIMENSION FILM</h1>
  <p style="margin-top:12px; max-width:600px; opacity:0.8;">
    Every viewing is different.<br>
    The dimensions rearrange themselves each time.
  </p>
  <button id="startButton">ENTER</button>
</div>

<div id="videoContainer">
  <video id="vidA" playsinline muted preload="auto"></video>
  <video id="vidB" playsinline muted preload="auto"></video>
</div>

<div id="grain"></div>
<div id="vignette"></div>

<div id="info">
  <div><strong>Dimension:</strong> <span id="dimensionName">—</span></div>
  <div><strong>Cuts:</strong> <span id="cutCounter">0</span></div>
  <div><strong>Reality Seed:</strong> <span id="seedDisplay"></span></div>
</div>

<script>
// ─── ELEMENTS ───────────────────────────────────────────────────────────────
const vidA        = document.getElementById('vidA');
const vidB        = document.getElementById('vidB');
const startBtn    = document.getElementById('startButton');
const startScreen = document.getElementById('startScreen');
const dimLabel    = document.getElementById('dimensionName');
const cutLabel    = document.getElementById('cutCounter');
const seedLabel   = document.getElementById('seedDisplay');

// ─── CONFIG ─────────────────────────────────────────────────────────────────
const MIN_CLIP  = 5;   // seconds
const MAX_CLIP  = 12;
const BUFFER    = 1;   // don't seek within last N secs of a file

// ─── ADD YOUR VIDEOS HERE ───────────────────────────────────────────────────
const dimensions = {
  MEMORY: ['videos/memory1.mp4', 'videos/memory2.mp4'],
  HORROR: ['videos/horror1.mp4', 'videos/horror2.mp4'],
  DREAM:  ['videos/dream1.mp4',  'videos/dream2.mp4'],
  VOID:   ['videos/void1.mp4',   'videos/void2.mp4'],
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentDim  = 'MEMORY';
let lastClip    = '';
let cutCount    = 0;
let showVid     = vidA;   // currently visible/audible
let hideVid     = vidB;   // preloading next clip
let cutTimer    = null;
let audioCtx, gainShow, gainHide, srcA, srcB;

// ─── SEED ────────────────────────────────────────────────────────────────────
let seed = localStorage.getItem('realitySeed');
if (!seed) { seed = Math.random().toString(36).slice(2, 10); localStorage.setItem('realitySeed', seed); }
seedLabel.textContent = seed;

// ─── UTILS ───────────────────────────────────────────────────────────────────
const pick   = arr => arr[Math.floor(Math.random() * arr.length)];
const range  = (a, b) => Math.random() * (b - a) + a;

function nextDim() {
  if (Math.random() < 0.35) return currentDim;
  return pick(Object.keys(dimensions));
}

function gainOf(vid) { return vid === vidA ? gainShow : gainHide; }
// After swap, gainShow/gainHide labels flip with the vids — we track by element.
// Actually we track by fixed assignment: gainA always belongs to vidA.
function gainForEl(vid) { return vid === vidA ? srcA._gain : srcB._gain; }

// ─── AUDIO INIT (must run inside user gesture) ───────────────────────────────
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const mediaA = audioCtx.createMediaElementSource(vidA);
  const mediaB = audioCtx.createMediaElementSource(vidB);

  const gA = audioCtx.createGain(); gA.gain.value = 0;
  const gB = audioCtx.createGain(); gB.gain.value = 0;

  mediaA.connect(gA).connect(audioCtx.destination);
  mediaB.connect(gB).connect(audioCtx.destination);

  // Stash gains keyed by element id for easy lookup
  vidA._gain = gA;
  vidB._gain = gB;
}

// ─── PRELOAD next clip into hideVid ──────────────────────────────────────────
function preloadInto(vid, clip, startTime) {
  return new Promise((resolve, reject) => {
    vid.onloadedmetadata = null;
    vid.onerror = null;

    vid.src   = clip;
    vid.load();

    vid.onloadedmetadata = () => {
      const safe  = Math.max(0, vid.duration - BUFFER - MIN_CLIP);
      const start = startTime !== undefined ? startTime : range(0, safe);
      vid.currentTime = start;

      // Wait for the seek to settle
      const onSeeked = () => {
        vid.removeEventListener('seeked', onSeeked);
        resolve(start);
      };
      vid.addEventListener('seeked', onSeeked);
    };

    vid.onerror = () => reject(new Error('Load failed: ' + clip));
  });
}

// ─── MAIN CUT ────────────────────────────────────────────────────────────────
async function cut() {
  currentDim = nextDim();
  dimLabel.textContent = currentDim;

  const clips = dimensions[currentDim];
  let clip = pick(clips);
  while (clip === lastClip && clips.length > 1) clip = pick(clips);
  lastClip = clip;

  // Preload into the hidden video — this awaits the seek so it's frame-ready
  try {
    await preloadInto(hideVid, clip);
  } catch (e) {
    console.warn(e);
    cutTimer = setTimeout(cut, 2000);
    return;
  }

  // Resume AudioContext if browser suspended it (common on mobile)
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  // Start playing the preloaded clip (it's muted via the element, so no block)
  try {
    await hideVid.play();
  } catch (e) {
    console.warn('play() blocked:', e);
    cutTimer = setTimeout(cut, 500);
    return;
  }

  // ── Swap ──
  const incoming = hideVid;
  const outgoing = showVid;

  // Visual crossfade
  incoming.style.opacity = '1';
  outgoing.style.opacity = '0';

  // Audio: silence outgoing, open incoming instantly
  outgoing._gain.gain.value = 0;
  incoming._gain.gain.value = 1;

  // Stop outgoing after transition completes
  setTimeout(() => { outgoing.pause(); outgoing.src = ''; }, 800);

  // Update state
  [showVid, hideVid] = [incoming, outgoing];
  cutCount++;
  cutLabel.textContent = cutCount;

  // Occasional glitch on the now-active video
  if (Math.random() > 0.92) {
    incoming.classList.add('glitch');
    setTimeout(() => incoming.classList.remove('glitch'), 180);
  }

  // Schedule next cut
  const clipLen = range(MIN_CLIP, MAX_CLIP);
  cutTimer = setTimeout(cut, clipLen * 1000);
}

// ─── START ───────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  startScreen.style.display = 'none';
  initAudio();   // AudioContext created synchronously in the gesture ✓
  cut();
});

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { clearTimeout(cutTimer); cut(); }
  if (e.key.toLowerCase() === 'g' && showVid) {
    showVid.classList.add('glitch');
    setTimeout(() => showVid.classList.remove('glitch'), 180);
  }
});
</script>

</body>
</html>
