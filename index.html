<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dimension Film</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: black; overflow: hidden; font-family: Arial, sans-serif; color: white; }

    #videoContainer { position: fixed; inset: 0; background: black; }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
      filter: contrast(1.05) brightness(0.95);
    }

    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.07;
      mix-blend-mode: soft-light;
      background-image: url('https://grainy-gradients.vercel.app/noise.svg');
      animation: grainShift 0.25s steps(2) infinite;
    }
    @keyframes grainShift {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-1%,1%); }
      50%  { transform: translate(1%,-1%); }
      75%  { transform: translate(1%,1%); }
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    }

    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.45);
      padding: 10px 15px;
      border-radius: 10px;
      backdrop-filter: blur(8px);
      font-size: 13px;
      line-height: 1.6;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: black;
      z-index: 999;
      text-align: center;
      padding: 24px;
    }

    #startButton {
      margin-top: 20px;
      padding: 14px 28px;
      font-size: 18px;
      border: none;
      border-radius: 999px;
      background: white;
      color: black;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    #startButton:hover { transform: scale(1.05); }

    .glitch { animation: glitch 0.18s linear; }
    @keyframes glitch {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-5px, 2px); }
      50%  { transform: translate(5px, -2px); }
      75%  { transform: translate(-2px, -4px); }
      100% { transform: translate(0,0); }
    }
  </style>
</head>
<body>

<div id="startScreen">
  <h1>DIMENSION FILM</h1>
  <p style="margin-top:12px; max-width:600px; opacity:0.8;">
    Every viewing is different.<br>The dimensions rearrange themselves each time.
  </p>
  <button id="startButton">ENTER</button>
</div>

<div id="videoContainer">
  <video id="vidA" playsinline muted preload="auto"></video>
  <video id="vidB" playsinline muted preload="auto"></video>
</div>

<div id="grain"></div>
<div id="vignette"></div>

<div id="info">
  <div><strong>Dimension:</strong> <span id="dimensionName">—</span></div>
  <div><strong>Cuts:</strong> <span id="cutCounter">0</span></div>
  <div><strong>Reality Seed:</strong> <span id="seedDisplay"></span></div>
</div>

<script>
// ── ELEMENTS ──────────────────────────────────────────────────────────────────
const vidA        = document.getElementById('vidA');
const vidB        = document.getElementById('vidB');
const startBtn    = document.getElementById('startButton');
const startScreen = document.getElementById('startScreen');
const dimLabel    = document.getElementById('dimensionName');
const cutLabel    = document.getElementById('cutCounter');
const seedLabel   = document.getElementById('seedDisplay');

// ── CONFIG ────────────────────────────────────────────────────────────────────
const MIN_CLIP = 5;    // seconds a clip plays before cutting
const MAX_CLIP = 12;
const BUFFER   = 2;    // avoid seeking within last N seconds of a file

// ── ADD YOUR VIDEOS HERE ──────────────────────────────────────────────────────
const dimensions = {
  MEMORY: ['videos/memory1.mp4', 'videos/memory2.mp4'],
  HORROR: ['videos/horror1.mp4', 'videos/horror2.mp4'],
  DREAM:  ['videos/dream1.mp4',  'videos/dream2.mp4'],
  VOID:   ['videos/void1.mp4',   'videos/void2.mp4'],
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentDim = 'MEMORY';
let lastClip   = '';
let cutCount   = 0;
let showVid    = vidA;   // currently visible + audible
let hideVid    = vidB;   // being preloaded in background
let cutTimer   = null;
let preloadPromise = null;  // the in-flight preload for the next clip

// ── SEED ──────────────────────────────────────────────────────────────────────
let seed = localStorage.getItem('realitySeed');
if (!seed) { seed = Math.random().toString(36).slice(2, 10); localStorage.setItem('realitySeed', seed); }
seedLabel.textContent = seed;

// ── UTILS ─────────────────────────────────────────────────────────────────────
const pick  = arr => arr[Math.floor(Math.random() * arr.length)];
const range = (a, b) => Math.random() * (b - a) + a;

function pickDim() {
  if (Math.random() < 0.35) return currentDim;
  return pick(Object.keys(dimensions));
}

function pickClip(dim) {
  const clips = dimensions[dim];
  let clip = pick(clips);
  while (clip === lastClip && clips.length > 1) clip = pick(clips);
  return clip;
}

// ── AUDIO INIT ────────────────────────────────────────────────────────────────
// Called synchronously inside the click handler — this is the only moment
// Chrome allows AudioContext creation without user-gesture restrictions.
let audioCtx;
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  [vidA, vidB].forEach(vid => {
    const src  = audioCtx.createMediaElementSource(vid);
    const gain = audioCtx.createGain();
    gain.gain.value = 0;
    src.connect(gain).connect(audioCtx.destination);
    vid._gain = gain;  // attach gain node directly to the element
  });
}

// ── PRELOAD ───────────────────────────────────────────────────────────────────
// Loads a clip into `vid`, seeks to a random start point, and resolves once
// the frame is ready. Does NOT clear src between uses — that causes re-downloads.
function preload(vid, clip) {
  return new Promise((resolve, reject) => {
    // Only reload if the src actually changed
    if (vid.src !== clip && !vid.src.endsWith(clip)) {
      vid.onloadedmetadata = null;
      vid.onerror = null;
      vid.src = clip;
      vid.load();
    }

    function doSeek() {
      const safe  = Math.max(0, vid.duration - BUFFER - MIN_CLIP);
      const start = range(0, Math.max(0, safe));
      vid.currentTime = start;

      const onSeeked = () => {
        vid.removeEventListener('seeked', onSeeked);
        resolve();
      };
      vid.addEventListener('seeked', onSeeked);

      // Fallback: if seeked never fires (some servers), resolve after 800ms
      setTimeout(resolve, 800);
    }

    if (vid.readyState >= 1) {
      // Metadata already available
      doSeek();
    } else {
      vid.onloadedmetadata = doSeek;
      vid.onerror = () => reject(new Error('Failed: ' + clip));
    }
  });
}

// ── START NEXT PRELOAD ────────────────────────────────────────────────────────
// Called right after a cut so the next clip is ready well before it's needed.
function kickNextPreload() {
  const dim  = pickDim();
  const clip = pickClip(dim);
  // Store what we chose so cut() can use it
  hideVid._pendingDim  = dim;
  hideVid._pendingClip = clip;
  preloadPromise = preload(hideVid, clip);
}

// ── CUT ───────────────────────────────────────────────────────────────────────
async function cut() {
  clearTimeout(cutTimer);

  // Wait for the preload that was kicked off during the previous clip
  try {
    await preloadPromise;
  } catch(e) {
    console.warn('Preload failed, retrying:', e);
    kickNextPreload();
    cutTimer = setTimeout(cut, 1500);
    return;
  }

  // Use the dim/clip that was chosen during preload
  const dim  = hideVid._pendingDim  || pickDim();
  const clip = hideVid._pendingClip || pickClip(dim);
  currentDim = dim;
  lastClip   = clip;
  dimLabel.textContent = currentDim;

  // Resume AudioContext (Chrome suspends it if the page loses focus)
  if (audioCtx && audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }

  // Play the preloaded video (muted at element level = never blocked)
  try {
    await hideVid.play();
  } catch(e) {
    console.warn('play() blocked:', e);
    cutTimer = setTimeout(cut, 500);
    return;
  }

  // ── Perform the swap ──────────────────────────────────────────────────────
  const incoming = hideVid;
  const outgoing = showVid;

  // Visual swap
  incoming.style.opacity = '1';
  outgoing.style.opacity = '0';

  // Audio swap via gain nodes — instant, no fade
  if (audioCtx) {
    incoming._gain.gain.setValueAtTime(1, audioCtx.currentTime);
    outgoing._gain.gain.setValueAtTime(0, audioCtx.currentTime);
  }

  // Pause outgoing after the visual transition finishes
  setTimeout(() => outgoing.pause(), 600);

  // Flip references
  [showVid, hideVid] = [incoming, outgoing];

  // Update counters
  cutCount++;
  cutLabel.textContent = cutCount;

  // Occasional glitch
  if (Math.random() > 0.92) {
    incoming.classList.add('glitch');
    setTimeout(() => incoming.classList.remove('glitch'), 180);
  }

  // Choose clip length, then immediately kick off the next preload
  // so it has the full clip duration to download and seek
  const clipLen = range(MIN_CLIP, MAX_CLIP);
  kickNextPreload();
  cutTimer = setTimeout(cut, clipLen * 1000);
}

// ── START ─────────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  startScreen.style.display = 'none';

  // AudioContext MUST be created synchronously here, inside the gesture
  initAudio();

  // Pick and preload the very first clip, then cut immediately when ready
  const dim  = pickDim();
  const clip = pickClip(dim);
  hideVid._pendingDim  = dim;
  hideVid._pendingClip = clip;
  preloadPromise = preload(hideVid, clip);
  cut();
});

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    clearTimeout(cutTimer);
    kickNextPreload();
    cut();
  }
  if (e.key.toLowerCase() === 'g' && showVid) {
    showVid.classList.add('glitch');
    setTimeout(() => showVid.classList.remove('glitch'), 180);
  }
});
</script>

</body>
</html>
