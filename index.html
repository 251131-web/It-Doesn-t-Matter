<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dimension Film</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    #videoContainer {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: black;
}

video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;

  opacity: 0;

  transition:
    opacity 0.6s ease,
transform 6s ease;

  filter:
    contrast(1.05)
    brightness(0.95);

  transform: scale(1.02);
  
 backface-visibility: hidden;
perspective: 1000; 

will-change: opacity, transform;
}

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.4));
      mix-blend-mode: screen;
      opacity: 0.4;
      animation: pulse 6s infinite alternate ease-in-out;
    }
	
	#grain {
  position: fixed;
  inset: 0;

  pointer-events: none;

  opacity: 0.08;

  mix-blend-mode: soft-light;

  background-image:
    url('https://grainy-gradients.vercel.app/noise.svg');

  animation: grainMove 0.3s steps(2) infinite;
}

@keyframes grainMove {
  0% { transform: translate(0,0); }
  25% { transform: translate(-1%,1%); }
  50% { transform: translate(1%,-1%); }
  75% { transform: translate(1%,1%); }
  100% { transform: translate(0,0); }
}

    @keyframes pulse {
      from {
        opacity: 0.2;
      }
      to {
        opacity: 0.5;
      }
    }

    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.5);
      padding: 12px 16px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      font-size: 14px;
      line-height: 1.5;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: black;
      z-index: 999;
      text-align: center;
      padding: 24px;
    }

    #startButton {
      margin-top: 20px;
      padding: 14px 28px;
      font-size: 18px;
      border: none;
      border-radius: 999px;
      background: white;
      color: black;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    #startButton:hover {
      transform: scale(1.05);
    }

    .glitch {
      animation: glitch 0.2s linear;
    }

    @keyframes glitch {
      0% { transform: translate(0px, 0px); }
      25% { transform: translate(-5px, 2px); }
      50% { transform: translate(5px, -2px); }
      75% { transform: translate(-2px, -4px); }
      100% { transform: translate(0px, 0px); }
    }
  </style>
</head>
<body>

  <div id="startScreen">
    <h1>DIMENSION FILM</h1>
    <p style="margin-top: 12px; max-width: 600px; opacity: 0.8;">
      Every viewing is different.<br>
      The dimensions rearrange themselves each time.
    </p>

    <button id="startButton">ENTER</button>
  </div>

  <div id="videoContainer">

  <video id="videoA" autoplay playsinline muted preload="auto"></video>

  <video id="videoB" autoplay playsinline muted preload="auto"></video>

</div>

  <div id="overlay"></div>
  
  <div id="grain"></div>

  <div id="info">
    <div><strong>Dimension:</strong> <span id="dimensionName">Unknown</span></div>
    <div><strong>Cuts:</strong> <span id="cutCounter">0</span></div>
    <div><strong>Reality Seed:</strong> <span id="seedDisplay"></span></div>
  </div>

  <script>
    const videoA = document.getElementById('videoA');
const videoB = document.getElementById('videoB');

let activeVideo = videoA;
let inactiveVideo = videoB;
    const startButton = document.getElementById('startButton');
    const startScreen = document.getElementById('startScreen');
    const dimensionName = document.getElementById('dimensionName');
    const cutCounter = document.getElementById('cutCounter');
    const seedDisplay = document.getElementById('seedDisplay');

    // ============================================
    // ADD YOUR VIDEO FILES HERE
    // ============================================

    const dimensions = {
      MEMORY: [
        'videos/memory1.mp4',
        'videos/memory2.mp4'
      ],

      HORROR: [
        'videos/horror1.mp4',
        'videos/horror2.mp4'
      ],

      DREAM: [
        'videos/dream1.mp4',
        'videos/dream2.mp4'
      ],

      VOID: [
        'videos/void1.mp4',
        'videos/void2.mp4'
      ]
    };

    // ============================================
    // SETTINGS
    // ============================================

    const MIN_CLIP_LENGTH = 5;
    const MAX_CLIP_LENGTH = 12;

    const MIN_START_BUFFER = 1;

    let cutCount = 0;
    let currentDimension = 'MEMORY';

    // Create a persistent random seed for each viewer
    let realitySeed = localStorage.getItem('realitySeed');

    if (!realitySeed) {
      realitySeed = Math.random().toString(36).substring(2, 10);
      localStorage.setItem('realitySeed', realitySeed);
    }

    seedDisplay.textContent = realitySeed;

let isTransitioning = false;
let nextCutTimeout;

    // ============================================
    // RANDOM HELPERS
    // ============================================

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    // ============================================
    // DIMENSION LOGIC
    // ============================================

    function chooseNextDimension() {

      const roll = Math.random();

      // 55% chance to stay in same dimension
      if (roll < 0.55) {
        return currentDimension;
      }

      const keys = Object.keys(dimensions);

      return randomItem(keys);
    }

    // ============================================
    // GLITCH EFFECTS
    // ============================================

    function triggerGlitch() {

  if (Math.random() > 0.92) {

    activeVideo.classList.add('glitch');

    setTimeout(() => {
      activeVideo.classList.remove('glitch');
    }, 200);
  }
}

    // ============================================
    // MAIN PLAYBACK SYSTEM
    // ============================================

async function playRandomSegment() {

  currentDimension = chooseNextDimension();

  dimensionName.textContent = currentDimension;

  const clips = dimensions[currentDimension];

  const selectedClip = randomItem(clips);

  inactiveVideo.src = selectedClip;
  inactiveVideo.load();

  inactiveVideo.oncanplay = null;
  inactiveVideo.oncanplay = () => {

    const safeDuration =
      inactiveVideo.duration - MIN_START_BUFFER;

    const randomStart = Math.max(
      0,
      Math.random() * (safeDuration - MIN_CLIP_LENGTH)
    );

    const randomLength =
  randomRange(
    MIN_CLIP_LENGTH,
    MAX_CLIP_LENGTH
  ) * (Math.random() > 0.8 ? 0.5 : 1);

    inactiveVideo.currentTime = randomStart;

    inactiveVideo.volume = 0;

    inactiveVideo.play().catch(err => {
  console.log("Playback prevented:", err);
});

    // Fade visuals
    inactiveVideo.style.opacity = 1;
    activeVideo.style.opacity = 0;

    // Slow cinematic zoom
    inactiveVideo.style.transform =
      'scale(1.08)';

    activeVideo.style.transform =
      'scale(1.00)';

    // AUDIO CROSSFADE
    let fade = 0;

    const fadeInterval = setInterval(() => {

      fade += 0.025;

      inactiveVideo.volume = Math.min(fade, 1);

      activeVideo.volume =
        Math.max(1 - fade, 0);

      if (fade >= 1) {

  clearInterval(fadeInterval);

  setTimeout(() => {
    activeVideo.pause();
  }, 300);

}

    }, 100);

    cutCount++;

    cutCounter.textContent = cutCount;
	
	triggerGlitch();

    // Swap videos
    [activeVideo, inactiveVideo] =
      [inactiveVideo, activeVideo];

    clearTimeout(nextCutTimeout);

nextCutTimeout = setTimeout(() => {
  playRandomSegment();
}, randomLength * 1500);
  };
}

    // ============================================
    // START EXPERIENCE
    // ============================================

    startButton.addEventListener('click', async () => {

      startScreen.style.display = 'none';

      videoA.muted = false;
videoB.muted = false;

      playRandomSegment();
    });

    // ============================================
    // OPTIONAL: KEYBOARD CONTROLS
    // ============================================

    document.addEventListener('keydown', (event) => {

      // SPACE = force dimension jump
      if (event.code === 'Space') {

  if (!isTransitioning) {

    isTransitioning = true;

    playRandomSegment();

    setTimeout(() => {
      isTransitioning = false;
    }, 800);
  }
}

      // G = glitch
      if (event.key.toLowerCase() === 'g') {
  triggerGlitch();
}
    });

  </script>

</body>
</html>
